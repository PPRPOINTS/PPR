        '<div class="oc-p">'+
          '<div class="oc-n">'+n.main+(st?'<span class="oc-str">'+st+'</span>':'')+'</div>'+
          (n.sub?'<div class="oc-sub">'+n.sub+'</div>':'')+
          '<div class="oc-warn" style="display:none"></div>'+
        '</div>'+
        '<div class="oc-pr"></div>'+
        '<div class="oc-stp">'+
          '<button class="oc-b" onclick="ocAdd(\''+p.sku+'\',-1)">−</button>'+
          '<input class="oc-q" type="number" min="0" max="99" value="0" onchange="ocSet(\''+p.sku+'\',this.value)">'+
          '<button class="oc-b" onclick="ocAdd(\''+p.sku+'\',1)">+</button>'+
        '</div>'+
      '</div>';
    }).join("");
    el.innerHTML=
      '<div class="sh"><h2>Order Calculator</h2></div>'+
      '<div class="oc-modes">'+
        '<button class="oc-mode" data-m="cash" onclick="ocSetMode(\'cash\')">Cash</button>'+
        '<button class="oc-mode" data-m="transfer" onclick="ocSetMode(\'transfer\')">Transfer</button>'+
      '</div>'+
      '<div class="oc-note">Prices come straight off the Products tab, so they stay in sync with the sheet. Cash orders have no postage. Transfer orders are $'+OC_SHIP+' express, free once the order hits $'+OC_FREE_AT+'.</div>'+
      '<div class="oc-wrap"><div class="oc-list">'+rows+'</div><div class="oc-sum" id="ocSum"></div></div>';
    el.dataset.sig=sig;
  }
  ocPaint();
}

/* ================= GST & Bank =================
 * Bank transfers only (Payment Method = "Bank transfer"), split across two accounts by a
 * switch date. Each account carries its own tax bracket, since account 1 is closed and may
 * sit in a different band to whatever account 2 ends up doing.
 * Counts money actually IN: needs Completed (col S) AND Paid (col P).
 */
const GST_THRESHOLD=75000;
const TAX_KEY_A1="peps_tax_bracket_a1_v2";
const TAX_KEY_A2="peps_tax_bracket_a2_v2";
const GST_BASIS_KEY="peps_gst_basis_v1";
const GST_SWITCH_KEY="peps_gst_switch_v2";
const GST_SWITCH_DEFAULT="2026-07-16";   // the day account 2 opened
// FY2026-27 resident rates (the 16% step dropped to 15% on 1 Jul 2026). Medicare levy is separate.
const TAX_BRACKETS=[
  {l:"0%",r:0,upTo:18200,band:"$0 - $18,200"},
  {l:"15%",r:.15,upTo:45000,band:"$18,201 - $45,000"},
  {l:"30%",r:.30,upTo:135000,band:"$45,001 - $135,000"},
  {l:"37%",r:.37,upTo:190000,band:"$135,001 - $190,000"},
  {l:"45%",r:.45,upTo:Infinity,band:"$190,001 +"}
];
// Defaults are set per account, NOT auto-picked off this business's profit on its own. This
// income stacks on top of Fund One and everything else, so the first PEPS dollar is never
// taxed at 0% — picking a band by amount would quietly show a $0 set-aside, which is the
// worst possible way for this tab to be wrong. Click a different rate and it sticks.
const TAX_DEF_A1=TAX_BRACKETS[2];   // 30%
const TAX_DEF_A2=TAX_BRACKETS[3];   // 37%
function taxGet(key,def){try{const v=localStorage.getItem(key);const f=v?TAX_BRACKETS.find(b=>b.l===v):null;return f||def;}catch(e){return def;}}
function taxSetA1(l){try{localStorage.setItem(TAX_KEY_A1,l);}catch(e){}rGst();}
function taxSetA2(l){try{localStorage.setItem(TAX_KEY_A2,l);}catch(e){}rGst();}
function gstBasis(){try{return localStorage.getItem(GST_BASIS_KEY)||"transfers";}catch(e){return "transfers";}}
function gstSetBasis(b){try{localStorage.setItem(GST_BASIS_KEY,b);}catch(e){}rGst();}
function gstSwitchISO(){try{return localStorage.getItem(GST_SWITCH_KEY)||GST_SWITCH_DEFAULT;}catch(e){return GST_SWITCH_DEFAULT;}}
function gstSetSwitch(v){if(!/^\d{4}-\d{2}-\d{2}$/.test(v||""))return;try{localStorage.setItem(GST_SWITCH_KEY,v);}catch(e){}rGst();}
function gstSwitchDate(){const m=gstSwitchISO().match(/^(\d{4})-(\d{2})-(\d{2})$/);return m?new Date(+m[1],+m[2]-1,+m[3]):new Date(2026,6,16);}
function gstDayLabel(d){return d.toLocaleDateString("en-AU",{day:"numeric",month:"short",year:"numeric"});}

function rGst(){
  // Money actually in: order fulfilled (col S) AND payment landed (col P). Col S alone is
  // only about goods going out — "Completed" with the transfer still missing is not income.
  // Trimmed both sides: fulfilment comes off the sheet untrimmed, so a stray space in
  // col S would silently drop the order out of tax and GST entirely.
  const gstOK=o=>String(o.fulfilment||"").trim()==="Completed"&&String(o.payStatus||"").trim()==="Paid"&&o.ownerPurchase!=="Yes";
  const sales=(D.orders||[]).filter(gstOK);
  const isTransfer=o=>String(o.payMethod||"").trim().toLowerCase()==="bank transfer";
  const transfers=sales.filter(isTransfer);
  const sw=gstSwitchDate();sw.setHours(0,0,0,0);

  // Split by account. Track money in, profit after lab cost, and vials shipped.
  // o.profit is what was actually paid minus (lab cost × qty), derived off the sheet's
  // "Total after COGS" — so the cost holds whatever price tier they ended up paying.
  // Deliberately NOT the sheet's own Profit column: that one is just Total after COGS,
  // so it ignores cash/owner pricing and books a free vial at zero instead of at cost.
  let a1=0,a2=0,n1=0,n2=0,gp1=0,gp2=0,q1=0,q2=0;
  transfers.forEach(o=>{
    const d=odObj(o.date),amt=o.lineTotal||0,prof=o.profit||0,qty=o.qty||0;
    if(d&&d<sw){a1+=amt;gp1+=prof;q1+=qty;n1++;}else{a2+=amt;gp2+=prof;q2+=qty;n2++;}
  });
  const tAmt=a1+a2;
  const allAmt=sales.reduce((s,o)=>s+(o.lineTotal||0),0);
  const lab1=a1-gp1,lab2=a2-gp2;

  // Packaging — per-vial figure off the COGS tab. Lab cost is already out via o.profit,
  // packaging isn't, so it comes off here.
  const perVial=(D.cogs&&D.cogs.perVial)||0;
  const pk1=q1*perVial,pk2=q2*perVial;

  // Running costs are NOT deducted. Money_Movements stopped being updated, so summing it
  // would quietly read zero, and the Dashboard's Total Expenses is one undated lifetime
  // figure — no honest way to split that across two separate entities. Left out on
  // purpose: it pushes the set-aside high, which is the safe direction to be wrong in.

  // Tax lands on what's left, not on turnover. Negative profit = nothing to set aside.
  const np1=gp1-pk1,np2=gp2-pk2;
  const b1=taxGet(TAX_KEY_A1,TAX_DEF_A1),b2=taxGet(TAX_KEY_A2,TAX_DEF_A2);
  const tax1=Math.max(0,np1)*b1.r,tax2=Math.max(0,np2)*b2.r;

  // Account 2 is a separate entity, so its GST threshold runs on its own turnover only —
  // nothing from account 1's entity carries across.
  const allFrom=sales.reduce((s,o)=>{const d=odObj(o.date);return s+((!d||d>=sw)?(o.lineTotal||0):0);},0);
  const basis=gstBasis(),onT=basis==="transfers";
  const counted=onT?a2:allFrom;
  const toGo=GST_THRESHOLD-counted;
  const pct=Math.min(100,Math.max(0,counted/GST_THRESHOLD*100));
  const mkBtns=(cur,fn)=>TAX_BRACKETS.map(x=>'<button class="gst-t'+(x.l===cur.l?" on":"")+'" onclick="'+fn+'(\''+x.l+'\')" title="'+x.band+'">'+x.l+'</button>').join("");
  const bandRef=TAX_BRACKETS.map(x=>'<div class="gst-band'+((x.l===b1.l||x.l===b2.l)?" on":"")+'"><span class="gst-band-r">'+x.l+'</span><span class="gst-band-b">'+x.band+'</span></div>').join("");
  const before=new Date(sw.getTime()-86400000);

  // Working — every step from money in to money set aside, so none of it is a black box.
  const wr=(lbl,v1,v2,cls)=>'<tr'+(cls?' class="'+cls+'"':'')+'><td>'+lbl+'</td><td>'+fuMoney(v1)+'</td><td>'+fuMoney(v2)+'</td><td>'+fuMoney(v1+v2)+'</td></tr>';
  const wd=(lbl,v1,v2)=>'<tr><td>'+lbl+'</td><td class="neg">-'+fuMoney(v1)+'</td><td class="neg">-'+fuMoney(v2)+'</td><td class="neg">-'+fuMoney(v1+v2)+'</td></tr>';
  const working=
    '<table class="gst-work"><thead><tr><th></th><th>Account 1</th><th>Account 2</th><th>Both</th></tr></thead><tbody>'+
      wr("Transfers in",a1,a2)+
      wd("Less lab cost",lab1,lab2)+
      wd("Less packaging"+(perVial?' &middot; '+fuMoney(perVial)+'/vial':''),pk1,pk2)+
      '<tr class="gap"><td>Less running costs</td><td colspan="3">not deducted &middot; not tracked in the sheet</td></tr>'+
      wr("Taxable profit",np1,np2,"sum")+
      '<tr class="rate"><td>Bracket</td><td>'+b1.l+'</td><td>'+b2.l+'</td><td>—</td></tr>'+
      wr("Set aside",tax1,tax2,"fin")+
    '</tbody></table>';

  document.getElementById("sec-gst").innerHTML=
    '<div class="sh"><h2>GST &amp; Bank</h2><span class="badge">'+transfers.length+' TRANSFERS</span></div>'+
    '<div class="mg mg3" style="margin-bottom:14px">'+
      '<div class="mc"><div class="mc-l">Account 1 · closed</div><div class="mc-v cm">'+fuMoney(a1)+'</div><div class="mc-s">'+n1+' transfers up to '+gstDayLabel(before)+' · profit '+fuMoney(np1)+' · tax '+b1.l+' = <b style="color:var(--amber)">'+fuMoney(tax1)+'</b></div></div>'+
      '<div class="mc" style="border-color:var(--green)"><div class="mc-l">Account 2 · live</div><div class="mc-v cm" style="color:var(--green)">'+fuMoney(a2)+'</div><div class="mc-s">'+n2+' transfers from '+gstDayLabel(sw)+' · profit '+fuMoney(np2)+' · tax '+b2.l+' = <b style="color:var(--amber)">'+fuMoney(tax2)+'</b></div></div>'+
      '<div class="mc" style="border-color:var(--amber)"><div class="mc-l">Tax set aside · both</div><div class="mc-v cm" style="color:var(--amber)">'+fuMoney(tax1+tax2)+'</div><div class="mc-s">on '+fuMoney(np1+np2)+' of profit, off '+fuMoney(tAmt)+' of transfers</div></div>'+
    '</div>'+
    '<div class="gst-reg"><span>Account 2 opened:</span>'+
      '<input type="date" class="gst-date" value="'+gstSwitchISO()+'" onchange="gstSetSwitch(this.value)">'+
      '<span class="gst-owed">Anything dated before this sits in account 1.</span></div>'+
    '<div class="gst-reg" style="margin-top:8px"><span style="min-width:150px">Account 1 bracket:</span>'+mkBtns(b1,"taxSetA1")+
      '<span class="gst-owed">'+fuMoney(np1)+' profit × '+b1.l+' = <b>'+fuMoney(tax1)+'</b></span></div>'+
    '<div class="gst-reg" style="margin-top:8px"><span style="min-width:150px">Account 2 bracket:</span>'+mkBtns(b2,"taxSetA2")+
      '<span class="gst-owed">'+fuMoney(np2)+' profit × '+b2.l+' = <b>'+fuMoney(tax2)+'</b></span></div>'+
    '<div class="gst-thresh" style="margin-top:12px">'+
      '<div class="gst-th-h">How the set-aside is built</div>'+
      working+
      '<div class="gst-note">Tax lands on <b>profit</b>, not turnover. Lab cost comes off each order using the sheet\'s Total after COGS, so a cash or discounted price does not skew it'+
        (perVial?', and packaging comes off at <b>'+fuMoney(perVial)+' a vial</b> from the COGS tab':'')+
        '. Not in here: running costs, postage, and anything else deductible - every one of them pushes the real number <b>down</b>, so this errs high rather than low. '+
        'Owner purchases are out, and so is anything not marked Completed and Paid.</div>'+
    '</div>'+
    '<div class="gst-thresh" style="margin-top:12px">'+
      '<div class="gst-th-h">Where the brackets kick in - FY2026-27 (1 Jul 2026 - 30 Jun 2027)</div>'+
      '<div class="gst-bands">'+bandRef+'</div>'+
      '<div class="gst-note">These run on your <b>total</b> taxable income for the year, not just this business - so the bracket you land in depends on Fund One and everything else too. That is why it is set by hand: pick the rate the <i>next</i> dollar of profit gets taxed at, not an average. Medicare levy adds 2% on top. The 15% step drops to 14% on 1 Jul 2027.</div>'+
    '</div>'+
    '<div class="gst-thresh" style="margin-top:12px">'+
      '<div class="gst-th-h">GST threshold - $75,000 · new entity, from '+gstDayLabel(sw)+'</div>'+
      '<div class="gst-reg" style="border:0;background:transparent;padding:0 0 10px 0">'+
        '<span>Count:</span>'+
        '<button class="gst-t'+(onT?" on":"")+'" onclick="gstSetBasis(\'transfers\')">Transfers only</button>'+
        '<button class="gst-t'+(!onT?" on":"")+'" onclick="gstSetBasis(\'all\')">All sales</button>'+
      '</div>'+
      '<div class="gst-bar-l">'+(onT?"Bank transfers":"All sales")+': <b>'+fuMoney(counted)+'</b> of $75,000 ('+pct.toFixed(0)+'%) &nbsp;·&nbsp; '+
        (toGo>0?'<b style="color:var(--blue)">'+fuMoney(toGo)+'</b> to go':'<b style="color:var(--red)">'+fuMoney(-toGo)+'</b> over')+'</div>'+
      '<div class="gst-bar"><div class="gst-fill" style="width:'+pct+'%;background:'+(counted>=GST_THRESHOLD?"var(--red)":"var(--blue)")+'"></div></div>'+
      '<div class="gst-note">Account 2 only, from '+gstDayLabel(sw)+' - the new entity starts its own $75k from scratch.'+
        (onT?' Transfers only, as set. All sales through the new entity come to <b>'+fuMoney(allFrom)+'</b>.':' Every sale counted. Bank transfers are <b>'+fuMoney(a2)+'</b> of it.')+
        ' Account 1\'s entity keeps its own separate $75k on its own turnover. This bar is gross turnover - the $75k has nothing to do with profit, so the working above does not touch it.</div>'+
    '</div>';
}

function rFollowups(){
  const today=new Date();today.setHours(0,0,0,0);
  const DAY=86400000;
  const baseOverride=fuGetBase();
  const owners=fuGetOwners();
  // Sell prices by SKU and by product name (for the reorder cost summary)
  const priceBySku={},priceByName={};
  (D.products||[]).forEach(p=>{
    if(p.sku)priceBySku[String(p.sku).trim().toLowerCase()]=p.netPrice;
    if(p.name)priceByName[String(p.name).trim().toLowerCase()]=p.netPrice;
  });
  // Bac water for the upsell (always shown as "Bac Water" — the sheet name is too clunky for a text)
  let bacPrice=0;const bacName="Bac Water";
  (D.products||[]).forEach(p=>{if(/bacteriostatic|bac\s*water/i.test(String(p.name||""))){if(p.netPrice)bacPrice=p.netPrice;}});
  const POSTAGE=12;
  // ---- Rewards context, mirroring what the client sees on their EARN page ----
  // Store credit comes off the Dashboard tab (same source the Points tab reads).
  const creditMap={};
  (function(){
    const dash=D.rawDashboard||[];
    let hr=-1,creditCol=-1,personCol=0;
    for(let i=0;i<dash.length;i++){
      const row=dash[i]||[];
      const ci=row.findIndex(c=>String(c||"").trim().toLowerCase()==="credit balance ($)");
      if(ci>=0){hr=i;creditCol=ci;const pi=row.findIndex(c=>String(c||"").trim().toLowerCase().startsWith("person"));personCol=pi>=0?pi:0;break;}
    }
    if(hr<0)return;
    for(let i=hr+1;i<dash.length;i++){
      const row=dash[i]||[];
      const nm=String(row[personCol]||"").trim();
      if(!nm)continue;
      creditMap[fuNorm(nm)]=num(row[creditCol]);
    }
  })();
  const nowD=new Date();const curY=nowD.getFullYear(),curM=nowD.getMonth();
  const monthSpend={},vialCount={},refCount={},seenCust={};
  D.orders.forEach(o=>{
    const nm=String(o.customer||"").trim();if(!nm)return;
    const k=fuNorm(nm);
    if(String(o.freeVial||"").trim().toLowerCase()==="yes")vialCount[k]=(vialCount[k]||0)+1;
    if(String(o.fulfilment||"").trim().toLowerCase()==="completed"){
      const d=odObj(o.date);
      if(d&&d.getFullYear()===curY&&d.getMonth()===curM)monthSpend[k]=(monthSpend[k]||0)+o.lineTotal;
    }
    // Referrals: a client tagged "(Referral X)" counts once toward X. Greedy + anchored so nested tags parse.
    if(!seenCust[k]){
      seenCust[k]=1;
      const m=nm.match(/\(\s*referral\s+(.+)\)\s*$/i);
      if(m){const r=fuNorm(fuShort(m[1]));if(r)refCount[r]=(refCount[r]||0)+1;}
    }
  });
  // Group orders by customer → latest order date + product set (with SKUs for pricing)
  const byCust={};
  D.orders.forEach(o=>{
    const name=String(o.customer||"").trim();if(!name)return;
    const od=odObj(o.date);
    if(!byCust[name])byCust[name]={name,latest:od,lastStr:o.date,products:new Set(),skuByProd:{}};
    if(o.product){byCust[name].products.add(o.product);if(o.sku)byCust[name].skuByProd[o.product]=o.sku;}
    if(od&&(!byCust[name].latest||od>byCust[name].latest)){byCust[name].latest=od;byCust[name].lastStr=o.date;}
  });
  const all=Object.values(byCust).map(c=>{
    // Baseline = manual override if set, else last order date
    const ov=baseOverride[fuNorm(c.name)]?new Date(baseOverride[fuNorm(c.name)]):null;
    const baseDate=ov||c.latest;
    const adjusted=!!ov;
    const daysSinceOrder=c.latest?Math.floor((today-c.latest)/DAY):null;
    // Per-product run-out from baseline (Bac Water excluded — not a treatment)
    const prodObjs=[...c.products].map(p=>{
      const sku=(c.skuByProd&&c.skuByProd[p])?String(c.skuByProd[p]).trim().toLowerCase():"";
      const price=(priceBySku[sku]!=null)?priceBySku[sku]:(priceByName[String(p).trim().toLowerCase()]||0);
      const key=fuProdKey(p);
      if(key===null)return {name:p,treat:false,price};
      const dur=fuProdDays(key);
      const runOut=baseDate?new Date(baseDate.getTime()+dur*DAY):null;
      const daysLeft=runOut?Math.round((runOut-today)/DAY):null;
      return {name:p,treat:true,key,dur,runOut,daysLeft,price};
    });
    const treatments=prodObjs.filter(p=>p.treat&&p.daysLeft!==null);
    treatments.sort((a,b)=>a.daysLeft-b.daysLeft);
    const soonest=treatments[0]||null;
    // Colour stage from soonest days-of-supply left
    let stage="green";
    if(soonest){
      if(soonest.daysLeft<=FU_RED_DAYS)stage="red";
      else if(soonest.daysLeft<=FU_AMBER_DAYS)stage="amber";
      else stage="green";
    }
    const activeLabels=treatments.map(t=>fuShort(t.name));
    const soonLabel=soonest?fuShort(soonest.name):"order";
    const allLabel=activeLabels.length?fuJoin(activeLabels):"order";
    // What they'd reorder = treatments running low, priced up, + bac water + postage
    const lowItems=treatments.filter(t=>t.daysLeft<=FU_AMBER_DAYS).map(t=>({label:fuShort(t.name),price:t.price||0}));
    const itemsCost=lowItems.reduce((s,it)=>s+(it.price||0),0);
    // total = what they pay (stock + bac water + postage). pointsTotal = stock only — postage never earns points.
    const stockCost=lowItems.length?(itemsCost+(bacPrice||0)):0;
    const cost={items:lowItems,bacName,bacPrice,postage:POSTAGE,total:lowItems.length?(stockCost+POSTAGE):0,pointsTotal:stockCost};
    // Rewards state: credit balance, free vial waiting, how many referrals off the next vial
    const ck=fuNorm(c.name),cleanK=fuNorm(fuShort(c.name));
    const refs=refCount[cleanK]||0;
    const vials=vialCount[ck]||0;
    const T=(cleanK==="nat")?3:4;                      // Nat's deal is 3 referrals, everyone else 4
    const pendingVial=Math.max(0,Math.floor(refs/T)-vials);
    const cycleRefs=Math.max(0,refs-vials*T);
    const rew={credit:creditMap[ck]||0,pendingVial,toVial:T-cycleRefs,monthSpend:monthSpend[ck]||0};
    return {
      name:c.name,stage,lastStr:c.lastStr,daysSinceOrder,baseDate,adjusted,
      products:prodObjs,soonest,isOwner:!!owners[ck],
      msg:fuMsg(stage,fuFirst(c.name),soonLabel,allLabel,cost,rew)+"\n\nOh - and your points & rewards page is here whenever you want it: "+earnLink(c.name)
    };
  });
  const tracked=all.filter(c=>!c.isOwner);
  fuOwnerList=all.filter(c=>c.isOwner);
  const nRed=tracked.filter(x=>x.stage==="red").length;
  const nAmber=tracked.filter(x=>x.stage==="amber").length;
  const nGreen=tracked.filter(x=>x.stage==="green").length;
  // Visible list = only who needs chasing (red + amber). Green = freshly stocked, hidden until due again.
  fuList=tracked.filter(c=>c.stage!=="green");
  const ordr={red:0,amber:1,green:2};
  fuList.sort((a,b)=>{
    if(ordr[a.stage]!==ordr[b.stage])return ordr[a.stage]-ordr[b.stage];
    const al=a.soonest?a.soonest.daysLeft:9999,bl=b.soonest?b.soonest.daysLeft:9999;
    return al-bl;
  });
  const labels={red:"Reorder due",amber:"Due soon",green:"On track"};
  const cards=fuList.map((c,i)=>{
    const chips=c.products.map(p=>{
      if(!p.treat)return '<span class="fu-chip fu-chip-mut">'+esc(fuShort(p.name))+'</span>';
      let cls="fu-chip-ok";
      if(p.daysLeft<=FU_RED_DAYS)cls="fu-chip-due";
      else if(p.daysLeft<=FU_AMBER_DAYS)cls="fu-chip-soon";
      const leftTxt=p.daysLeft<=0?"out now":p.daysLeft+"d left";
      return '<span class="fu-chip '+cls+'">'+esc(fuShort(p.name))+' · ~'+fuWeeks(p.dur)+' · '+leftTxt+'</span>';
    }).join("");
    const metaBits=[];
    if(c.lastStr)metaBits.push("Last order: "+sDate(c.lastStr)+(c.daysSinceOrder!=null?" · "+c.daysSinceOrder+"d ago":""));
    if(c.soonest&&c.soonest.runOut)metaBits.push("Needs more ~"+fuFmtDate(c.soonest.runOut));
    if(c.adjusted)metaBits.push("timer adjusted");
    const actions=
      '<button class="fu-btn fu-btn-copy" onclick="fuCopy(this,'+i+')">Copy message</button>'+
      '<button class="fu-btn fu-btn-done" onclick="fuContacted('+i+')" title="Restart their vial period from today">Mark contacted today</button>'+
      '<button class="fu-btn fu-btn-snooze" onclick="fuPush('+i+',7)" title="Push reminder out a week">+1 wk</button>'+
      '<button class="fu-btn fu-btn-snooze" onclick="fuPush('+i+',14)" title="Push reminder out two weeks">+2 wks</button>'+
      '<button class="fu-btn fu-btn-reset" onclick="fuResetStd('+i+')" title="Reset their reorder to about 4 weeks out — drops them off the list until it&#39;s due again">Reset · 4 wks</button>'+
      '<button class="fu-btn fu-btn-owner" onclick="fuOwner('+i+')" title="Mark as owner, stop tracking">Owner</button>';
    return '<div class="fu-card fu-'+c.stage+'">'+
      '<div class="fu-head"><div><div class="fu-name">'+esc(c.name)+'</div></div><span class="fu-badge fu-badge-'+c.stage+'">'+labels[c.stage]+'</span></div>'+
      '<div class="fu-chips">'+chips+'</div>'+
      '<div class="fu-meta">'+metaBits.join(" · ")+'</div>'+
      '<div class="fu-msg">'+esc(c.msg)+'</div>'+
      '<div class="fu-actions">'+actions+'</div>'+
    '</div>';
  }).join("");
  let ownerStrip="";
  if(fuOwnerList.length){
    ownerStrip='<div class="fu-owners"><div class="fu-owners-h">Owners · not tracked ('+fuOwnerList.length+')</div><div class="fu-owners-list">'+
      fuOwnerList.map((c,i)=>'<span class="fu-owner-chip">'+esc(c.name)+'<button onclick="fuUnowner('+i+')" title="Track again">×</button></span>').join("")+
      '</div></div>';
  }
  document.getElementById("sec-followups").innerHTML=
    '<div class="sh"><h2>Client Follow-Ups</h2><span class="badge">'+fuList.length+' DUE</span></div>'+
    '<div class="mg mg3" style="margin-bottom:14px">'+
      '<div class="mc" style="border-color:var(--red)"><div class="mc-l">Reorder Due</div><div class="mc-v cm" style="color:var(--red)">'+nRed+'</div><div class="mc-s">A week or less of supply</div></div>'+
      '<div class="mc" style="border-color:var(--amber)"><div class="mc-l">Due Soon</div><div class="mc-v cm" style="color:var(--amber)">'+nAmber+'</div><div class="mc-s">About 2 weeks of supply left</div></div>'+
      '<div class="mc" style="border-color:var(--green)"><div class="mc-l">On Track</div><div class="mc-v cm c-pos">'+nGreen+'</div><div class="mc-s">3+ weeks of supply left</div></div>'+
    '</div>'+
    '<div style="font-size:11px;color:var(--dim);margin-bottom:12px;line-height:1.5">Only clients getting low show here. Colour is estimated per product off their last order (Bac Water ignored): red is a week or less of supply left, amber about two weeks. Anyone with 3+ weeks left drops off the list until they\u2019re due again. Mark contacted restarts their clock from today. Reset \u00b7 4 wks sets their next reorder about four weeks out, so they drop off now and pop back up as it gets close. +1 wk and +2 wks push the reminder out if they\u2019re stretching it. Owner stops tracking that person for good.</div>'+
    (cards?'<div class="fu-grid">'+cards+'</div>':(tracked.length?'<div class="fu-empty">All caught up — nobody\u2019s due for a follow-up right now.</div>':'<div class="fu-empty">No clients to track yet.</div>'))+
    ownerStrip;
}

// ============ POINTS / LOYALTY ============
// Tiers off lifetime completed spend. Points double as $ store credit. Edit here if tiers change.
const PTS_TIERS=[{min:100,pts:10},{min:300,pts:25},{min:500,pts:40}]; // ascending
function ptsFor(spend){let p=0;for(const t of PTS_TIERS){if(spend>=t.min)p=t.pts;}return p;}
function ptsNext(spend){for(const t of PTS_TIERS){if(spend<t.min)return t;}return null;} // null = top tier
function ptsYM(y,m){return y+"-"+String(m+1).padStart(2,"0");}
function ptsMoney0(n){return "$"+Math.round(n).toLocaleString("en-AU");}

function rPoints(){
  const now=new Date();
  const curY=now.getFullYear(), curM=now.getMonth(); // 0-based month
  // Credit Balance ($) is surfaced straight from the Dashboard tab's Client Points block (column K).
  // The sheet formula is the source of truth — we just read it and match by person name.
  const creditMap={};
  (function(){
    const dash=D.rawDashboard||[];
    let hr=-1,creditCol=-1,personCol=0;
    for(let i=0;i<dash.length;i++){
      const row=dash[i]||[];
      const ci=row.findIndex(c=>String(c||"").trim().toLowerCase()==="credit balance ($)");
      if(ci>=0){hr=i;creditCol=ci;const pi=row.findIndex(c=>String(c||"").trim().toLowerCase().startsWith("person"));personCol=pi>=0?pi:0;break;}
    }
    if(hr<0)return;
    for(let i=hr+1;i<dash.length;i++){
      const row=dash[i]||[];
      const nm=String(row[personCol]||"").trim();
      if(!nm)continue;
      creditMap[nm]=num(row[creditCol]);
    }
  })();
  // Group orders by trimmed customer name. All names show; spend/points/streak use Completed only.
  const byCust={};
  D.orders.forEach(o=>{
    const name=String(o.customer||"").trim();if(!name)return;
    if(!byCust[name])byCust[name]={name,spend:0,orders:0,monthSpend:0,months:new Set(),creditUsed:0};
    byCust[name].creditUsed+=num(o.creditUsed)||0; // credit redeemed on any order, counted regardless of status
    const completed=String(o.fulfilment||"").trim().toLowerCase()==="completed";
    if(!completed)return;
    const d=odObj(o.date); // DD/MM/YYYY → Date (already defined for follow-ups)
    byCust[name].spend+=o.lineTotal; // lineTotal is already owner-priced where applicable
    byCust[name].orders+=1;
    if(d){
      byCust[name].months.add(ptsYM(d.getFullYear(),d.getMonth()));
      if(d.getFullYear()===curY&&d.getMonth()===curM)byCust[name].monthSpend+=o.lineTotal;
    }
  });
  const rows=Object.values(byCust).map(c=>{
    const points=ptsFor(c.spend);
    // Streak: consecutive calendar months with a completed purchase, counting back from this month
    let streak=0,y=curY,m=curM;
    for(let i=0;i<12;i++){
      if(c.months.has(ptsYM(y,m))){streak++;m--;if(m<0){m=11;y--;}}
      else break;
    }
    const bought=c.monthSpend>0;
    const maxed=c.spend>=500;
    const nt=ptsNext(c.spend);
    let heads,hc;
    if(c.orders===0){heads="Lapsed — buy $100+ to restart streak";hc="c-dim";}
    else if(bought&&(maxed||!nt)){heads="Top tier hit this month 🎉";hc="c-pos";}
    else if(bought&&nt){heads="Spend "+ptsMoney0(nt.min-c.spend)+" more to reach $"+nt.pts+" credit";hc="c-neut";}
    else if(!bought){heads="⚠ No buy this month — spend $100+ before month-end or streak resets";hc="c-warn";}
    else {heads="Lapsed — buy $100+ to restart streak";hc="c-dim";}
    const earnedCredit=creditMap[c.name]||0;
    const usedCredit=c.creditUsed||0;
    const availCredit=Math.max(0,earnedCredit-usedCredit);
    return {name:c.name,spend:c.spend,orders:c.orders,monthSpend:c.monthSpend,points,streak,heads,hc,maxed,credit:availCredit,earned:earnedCredit,used:usedCredit};
  });
  rows.sort((a,b)=>b.points-a.points||b.spend-a.spend||a.name.localeCompare(b.name));
  const totPoints=rows.reduce((s,r)=>s+r.points,0);
  const totalCredit=rows.reduce((s,r)=>s+r.credit,0);
  const withCredit=rows.filter(r=>r.credit>0).length;
  // Days left in the current month (counts today)
  const daysLeft=new Date(curY,curM+1,0).getDate()-now.getDate()+1;
  // Next monthly credit tier above a given this-month spend
  function nextTier(ms){
    if(ms<100)return{need:100-ms,credit:10};
    if(ms<300)return{need:300-ms,credit:25};
    if(ms<500)return{need:500-ms,credit:40};
    return null;
  }
  // Top 5 clients by spend (earnings)
  const top5=rows.slice().sort((a,b)=>b.spend-a.spend||a.name.localeCompare(b.name)).slice(0,5);
  // Needs a push: active clients who can still earn (more) credit this month, urgent first
  const push=rows.filter(r=>r.orders>0&&nextTier(r.monthSpend)).map(r=>{
    const t=nextTier(r.monthSpend);
    return {name:r.name,need:t.need,credit:t.credit,streak:r.streak,noBuy:r.monthSpend<=0};
  }).sort((a,b)=> a.need-b.need || b.streak-a.streak || a.name.localeCompare(b.name)).slice(0,7);
  const topTier=rows.filter(r=>r.maxed).length;
  const monthSpend=rows.reduce((s,r)=>s+r.monthSpend,0);
  const active=rows.filter(r=>r.orders>0).length;
  const body=rows.length?rows.map((r,i)=>{
    const streakCell=r.streak>0?('<span class="cm">'+r.streak+(r.streak>=2?' 🔥':'')+'</span>'):'<span class="c-mut cm">0</span>';
    const monthCell=r.monthSpend>0?'<span class="c-pos cm">'+fmt(r.monthSpend)+'</span>':'<span class="c-mut cm">$0.00</span>';
    const usedNote=r.used>0?'<span class="c-mut" style="font-size:10px"> · '+fmt(r.used)+' used</span>':'';
    const creditCell=(r.credit>0?'<span class="c-pos cm" style="font-weight:600">'+fmt(r.credit)+'</span>':'<span class="c-mut cm">$0.00</span>')+usedNote;
    return '<tr><td class="cm" style="color:var(--mut)">'+(i+1)+'</td>'+
      '<td>'+esc(r.name)+'</td>'+
      '<td class="cm" style="text-align:right">'+fmt(r.spend)+'</td>'+
      '<td class="cm" style="text-align:center">'+r.orders+'</td>'+
      '<td style="text-align:right">'+creditCell+'</td>'+
      '<td style="text-align:right">'+monthCell+'</td>'+
      '<td style="text-align:center">'+streakCell+'</td>'+
      '<td class="'+r.hc+'" style="font-size:12px">'+esc(r.heads)+'</td></tr>';
  }).join(""):'<tr><td colspan="8" style="text-align:center;color:var(--dim);padding:24px">No customers yet</td></tr>';
  const top5Body=top5.length?top5.map((r,i)=>
    '<tr><td class="cm" style="color:var(--mut);width:16px">'+(i+1)+'</td>'+
    '<td>'+esc(r.name)+'</td>'+
    '<td class="cm" style="text-align:right">'+fmt(r.spend)+'</td>'+
    '<td class="cm" style="text-align:center">'+(r.streak>0?(r.streak+(r.streak>=2?' 🔥':'')):'<span class="c-mut">0</span>')+'</td></tr>'
  ).join(""):'<tr><td colspan="4" style="color:var(--dim);text-align:center;padding:14px">No clients yet</td></tr>';
  const pushBody=push.length?push.map(r=>
    '<tr><td>'+esc(r.name)+'</td>'+
    '<td class="cm" style="text-align:right;color:var(--amber)">'+fmt(r.need)+'</td>'+
    '<td class="cm" style="text-align:right;color:var(--dim)">$'+r.credit+'</td></tr>'
  ).join(""):'<tr><td colspan="3" style="color:var(--green);text-align:center;padding:14px">Everyone\u2019s on track this month</td></tr>';
  document.getElementById("sec-points").innerHTML=
    '<div class="sh"><h2>Client Points</h2><span class="badge">'+active+' ACTIVE</span></div>'+
    '<div class="mg" style="grid-template-columns:1fr;margin-bottom:14px">'+
      '<div class="mc" style="border-color:var(--amber)"><div class="mc-l">Total Credit Outstanding</div><div class="mc-v cm" style="color:var(--amber)">'+fmt(totalCredit)+'</div><div class="mc-s">Spendable store credit owed across '+withCredit+' client'+(withCredit===1?'':'s')+'</div></div>'+
    '</div>'+
    '<div class="mg mg2" style="margin-bottom:14px">'+
      '<div class="mc">'+
        '<div class="mc-l" style="margin-bottom:8px">Top 5 Clients</div>'+
        '<table><thead><tr><th style="width:16px">#</th><th>Client</th><th style="text-align:right">Spend</th><th style="text-align:center">Streak</th></tr></thead><tbody>'+top5Body+'</tbody></table>'+
      '</div>'+
      '<div class="mc">'+
        '<div class="mc-l">Needs a Push</div>'+
        '<div style="font-size:11px;color:var(--mut);margin:2px 0 8px">'+daysLeft+' day'+(daysLeft===1?'':'s')+' left this month</div>'+
        '<table><thead><tr><th>Client</th><th style="text-align:right">Spend more</th><th style="text-align:right">Unlocks</th></tr></thead><tbody>'+pushBody+'</tbody></table>'+
      '</div>'+
    '</div>'+
    '<div style="font-size:11px;color:var(--dim);margin-bottom:12px;line-height:1.5">Clients earn store credit each month they buy, based on that month\u2019s completed spend ($100+=$10, $300+=$25, $500+=$40). Credit stacks every month with no cap. When a client spends credit on an order, put the dollar amount in the Credit Used column and it comes straight off their balance here. Skip a month and you keep your credit but lose streak progress. Owner/cost-price orders count at what was actually paid.</div>'+
    '<div class="tw"><div class="ts"><table><thead><tr><th>#</th><th>Person</th><th style="text-align:right">Total Spend</th><th style="text-align:center">Orders</th><th style="text-align:right">Credit Balance</th><th style="text-align:right">This Month</th><th style="text-align:center">Streak</th><th>Heads-Up</th></tr></thead><tbody>'+body+'</tbody></table></div></div>';
}

function setOrdersFilter(k){ordersFilter=k;rOrders();}
function setOrdersSearch(v){
  ordersSearch=v;
  const cursor=document.getElementById("ord-search")?document.getElementById("ord-search").selectionStart:v.length;
  rOrders();
  const s=document.getElementById("ord-search");
  if(s){s.focus();try{s.setSelectionRange(cursor,cursor);}catch(e){}}
}

function rOrders(){
  // Sort newest first
  const sorted=[...D.orders].sort((a,b)=>parseOrderDate(b.date)-parseOrderDate(a.date));

  // Counts (using full unfiltered set so buttons always show totals)
  const isFree=o=>String(o.freeVial||"").toLowerCase()==="yes";
  const isDelivered=o=>o.fulfilment==="Delivered"||o.fulfilment==="Completed";
  const isActionNeeded=o=>o.payStatus==="Paid"&&!isDelivered(o);
  const isUnpaid=o=>o.payStatus!=="Paid";
  const counts={
    all:D.orders.length,
    unpaid:D.orders.filter(isUnpaid).length,
    action:D.orders.filter(isActionNeeded).length,
    delivered:D.orders.filter(isDelivered).length,
    free:D.orders.filter(isFree).length
  };

  // Apply filter
  let filtered=sorted;
  if(ordersFilter==="unpaid")filtered=sorted.filter(isUnpaid);
  else if(ordersFilter==="action")filtered=sorted.filter(isActionNeeded);
  else if(ordersFilter==="delivered")filtered=sorted.filter(isDelivered);
  else if(ordersFilter==="free")filtered=sorted.filter(isFree);

  // Apply search
  if(ordersSearch){
    const q=ordersSearch.toLowerCase();

// Find the Product that matches an Inventory_Summary row (reverse of invStockFor):
// exact SKU (trim + case), else prefix match disambiguated by the strength digits
// in the product SKU appearing in the inventory row's name.
function prodForInv(invRow, products){
  const is=String(invRow.sku||"").trim().toLowerCase();
  if(!is)return null;
  let p=products.find(pp=>String(pp.sku||"").trim().toLowerCase()===is);
  if(!p){
    const cand=products.filter(pp=>{const ps=String(pp.sku||"").trim().toLowerCase();return ps&&(ps.startsWith(is)||is.startsWith(ps));});
    if(cand.length>1){
      const nm=String(invRow.name||"").toLowerCase();
      p=cand.find(pp=>{const m=String(pp.sku||"").toLowerCase().match(/(\d+)\s*$/);return m&&nm.includes(m[1]);})||cand[0];
    } else p=cand[0]||null;
  }
  return p||null;
}
// Match a product to its Inventory_Summary stock, resilient to SKU mismatches:
//  - trims + lowercases SKUs (fixes "Klow " trailing-space vs "Klow")
//  - if no exact SKU match, falls back to prefix match and disambiguates by the
//    strength digits in the product SKU (fixes Products "RETAT20"/"RETAT15" vs
//    Inventory "RETAT" on rows named "Retatrutide 20mg"/"Retatrutide 15mg")
function invStockFor(p, inv){
  const ps=String(p.sku||"").trim().toLowerCase();
  let rows=inv.filter(i=>String(i.sku||"").trim().toLowerCase()===ps);
  if(!rows.length && ps){
    const cand=inv.filter(i=>{const is=String(i.sku||"").trim().toLowerCase();return is&&(ps.startsWith(is)||is.startsWith(ps));});
    if(cand.length>1){
      const m=ps.match(/(\d+)\s*$/);
      const narrowed=m?cand.filter(i=>String(i.name||"").toLowerCase().includes(m[1])):[];
      rows=narrowed.length?narrowed:cand;
    } else rows=cand;
  }
  let total=0,storage=0,duds=0;
  rows.forEach(i=>{total+=i.total;storage+=i.storage;duds+=(i.duds||0);});
  return {total,storage,duds};
}

  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(D.orders.map(o=>({Date:o.date,Customer:o.customer,Product:o.product,Qty:o.qty,Total:o.lineTotal,Payment:o.payStatus,Balance:o.balanceDue,Fulfilment:o.fulfilment,Person:o.responsible}))),"Orders");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(D.products.map(p=>({SKU:p.sku,Product:p.name,"On Hand":p.onHand,Cost:p.cost,"Sell Price":p.netPrice,Margin:p.marginPct,Status:p.status}))),"Products");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(D.lab.map(l=>({Date:l.date,SKU:l.sku,Product:l.product,Qty:l.qty,"Total inc GST":l.totalIncGst,Status:l.status,Notes:l.notes}))),"Lab_Orders");

function rStocklist(){
  const sec=document.getElementById("sec-stocklist");
  // Only build the iframe once - re-rendering would lose user's cart state
  if(sec.dataset.built==="1")return;
  sec.dataset.built="1";
  sec.innerHTML='<div class="sh" style="margin-bottom:12px"><h2>Stock List</h2><span class="badge">Supplier · VIP Pricing</span></div>'+
    '<div style="background:#fafaf7;border:1px solid var(--bdr);border-radius:12px;overflow:hidden">'+
      '<iframe id="stocklistFrame" style="width:100%;height:600px;border:0;display:block;background:#fafaf7" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals" scrolling="no" src="data:text/html;base64,'+SUPPLIER_HUB_B64+'"></iframe>'+
    '</div>';
  // Listen for height messages from the supplier hub iframe and resize accordingly
  // This eliminates the double-scroll problem (no inner scroll, parent scrolls naturally)
  if(!window._stocklistResizeBound){
    window._stocklistResizeBound=true;
    window.addEventListener('message',function(e){
      if(!e||!e.data)return;
      if(e.data.type==='supplierhub-resize'&&typeof e.data.height==='number'){
        const frame=document.getElementById('stocklistFrame');
        // Ignore implausibly small heights so the frame can never collapse into a shrinking bar
        if(frame&&e.data.height>=200){frame.style.height=(e.data.height+4)+'px';}
      }
      if(e.data.type==='supplierhub-scroll-to-cart'){
        const frame=document.getElementById('stocklistFrame');
        if(frame){
          const rect=frame.getBoundingClientRect();
          const y=window.pageYOffset+rect.top-20;
          window.scrollTo({top:y,behavior:'smooth'});
        }
      }
    });
  }
}

renderTabs();
if(SCRIPT_URL){document.getElementById("setupBox").style.display="none";startRefresh();refreshData();}
