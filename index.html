<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEPS HUB — Live Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--card:#181a23;--card2:#1e2130;--bdr:#2a2d3a;--bdr2:#353849;--txt:#e8e9ed;--dim:#8b8fa3;--mut:#5d6178;--blue:#4f8cff;--green:#34d399;--red:#f87171;--amber:#fbbf24;--purple:#a78bfa;--cyan:#22d3ee;
  /* Phone zoom: scales the whole app (every tab) so more fits on screen.
     1 = off, .7 = 70%. This is the only number to change. */
  --mzoom:.7}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;line-height:1.5}
.app{max-width:1400px;margin:0 auto;padding:24px 20px}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--bdr);flex-wrap:wrap;gap:12px}
.hdr h1{font-size:24px;font-weight:700}.hdr h1 span{color:var(--blue)}
.hdr p{font-size:13px;color:var(--dim);margin-top:2px}
.hdr-r{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-txt{font-size:12px;color:var(--dim);font-family:'JetBrains Mono',monospace}
.tabs{display:flex;gap:4px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px}
.tab{padding:9px 18px;border:1px solid var(--bdr);background:transparent;color:var(--dim);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;transition:all .2s;white-space:nowrap}
.tab:hover{background:var(--card);color:var(--txt)}.tab.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn{padding:9px 18px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-p{background:var(--blue);color:#fff}.btn-p:hover{background:#3d7ae6}
.btn-s{background:transparent;border:1px solid var(--bdr);color:var(--dim)}.btn-s:hover{background:var(--card);color:var(--txt)}
.btn-sm{font-size:12px;padding:6px 12px}
.mg{display:grid;gap:14px;margin-bottom:24px}
.mg5{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}
.mg4{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.mg3{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
.mg2{grid-template-columns:repeat(auto-fit,minmax(340px,1fr))}
.mc{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px;transition:all .2s}
.mc:hover{border-color:var(--bdr2);background:var(--card2)}
.mc-l{font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.mc-v{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600}
.mc-s{font-size:11px;color:var(--mut);margin-top:3px}
.tw{background:var(--card);border:1px solid var(--bdr);border-radius:12px;overflow:hidden}
.ts{overflow-x:auto;max-height:65vh;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#14161f;padding:10px 14px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);white-space:nowrap;border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:1}
tbody td{padding:10px 14px;border-bottom:1px solid rgba(42,45,58,.5);white-space:nowrap}
tbody tr:hover{background:var(--card2)}
.cm{font-family:'JetBrains Mono',monospace;font-size:12px}
.chip{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;background:var(--bdr);color:var(--dim)}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.pill-g{background:rgba(52,211,153,.12);color:var(--green)}.pill-a{background:rgba(251,191,36,.12);color:var(--amber)}.pill-r{background:rgba(248,113,113,.12);color:var(--red)}.pill-b{background:rgba(79,140,255,.12);color:var(--blue)}.pill-p{background:rgba(167,139,250,.12);color:var(--purple)}
.trow td{font-weight:700!important;background:#14161f!important;border-top:2px solid var(--blue)!important}
.sec{display:none}.sec.on{display:block}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.sh h2{font-size:17px;font-weight:600}
.badge{font-size:11px;font-family:'JetBrains Mono',monospace;padding:4px 10px;border-radius:20px;background:rgba(79,140,255,.15);color:var(--blue)}
.ptr-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:20px}.ptr-card:hover{border-color:var(--bdr2)}
.ptr-nm{font-size:18px;font-weight:700;margin-bottom:14px}
.ptr-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(42,45,58,.5);font-size:13px}.ptr-row:last-child{border-bottom:none}
.ptr-rl{color:var(--dim)}.ptr-rv{font-family:'JetBrains Mono',monospace;font-weight:500}
.ptr-exp{margin-top:14px;padding-top:10px;border-top:1px solid var(--bdr)}
.ptr-exp-h{font-size:11px;color:var(--mut);margin-bottom:6px}
.ptr-exp-i{display:flex;justify-content:space-between;font-size:12px;padding:2px 0}
.ptr-exp-il{color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px}
.ptr-exp-iv{font-family:'JetBrains Mono',monospace;color:var(--dim);white-space:nowrap}
.ptr-exps{max-height:200px;overflow-y:auto}
.c-pos{color:var(--green)}.c-neg{color:var(--red)}.c-warn{color:var(--amber)}.c-neut{color:var(--txt)}.c-dim{color:var(--dim)}
.c-mut{color:var(--mut)}
.pts-badge{display:inline-block;min-width:26px;padding:2px 9px;border-radius:20px;background:rgba(251,191,36,.15);color:var(--amber);font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600}
/* Follow-Ups */
.fu-grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:900px){.fu-grid{grid-template-columns:1fr 1fr}}
.fu-card{background:var(--card);border:1px solid var(--bdr);border-left-width:3px;border-radius:12px;padding:14px}
.fu-card.fu-red{border-left-color:var(--red)}
.fu-card.fu-amber{border-left-color:var(--amber)}
.fu-card.fu-green{border-left-color:var(--green)}
.fu-card.fu-done{opacity:.6}
.fu-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px}
.fu-name{font-size:15px;font-weight:700;line-height:1.2}
.fu-chips{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0 8px}
.fu-chip{font-size:11px;font-family:'JetBrains Mono',monospace;padding:3px 8px;border-radius:6px;line-height:1.3;white-space:nowrap}
.fu-chip-due{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.fu-chip-soon{background:rgba(251,191,36,.13);color:var(--amber)}
.fu-chip-ok{background:var(--card2);color:var(--dim)}
.fu-chip-mut{background:transparent;color:var(--mut);border:1px dashed var(--bdr)}
.fu-badge{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding:4px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.fu-badge-red{background:rgba(248,113,113,.14);color:var(--red)}
.fu-badge-amber{background:rgba(251,191,36,.14);color:var(--amber)}
.fu-badge-green{background:rgba(52,211,153,.14);color:var(--green)}
.fu-meta{font-size:11px;color:var(--mut);font-family:'JetBrains Mono',monospace;margin-bottom:10px;line-height:1.5}
.fu-msg{background:var(--bg);border:1px solid var(--bdr);border-radius:9px;padding:10px 12px;font-size:13px;line-height:1.5;color:var(--txt);margin-bottom:10px;white-space:pre-line}
.lk-copy{background:var(--card2);border:1px solid var(--bdr2);color:var(--txt);border-radius:7px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.lk-copy:hover{border-color:var(--blue)}
.lk-link{color:var(--blue);text-decoration:none;font-size:12px;font-family:'JetBrains Mono',monospace}
.lk-link:hover{text-decoration:underline}
.fu-actions{display:flex;gap:8px;flex-wrap:wrap}
.fu-btn{flex:1;min-width:120px;padding:9px 12px;border-radius:8px;border:1px solid var(--bdr2);background:var(--card2);color:var(--txt);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.fu-btn:active{transform:scale(.97)}
.fu-btn-copy{background:var(--blue);border-color:var(--blue);color:#fff}
.fu-btn-copy.copied{background:var(--green);border-color:var(--green)}
.fu-btn-done{background:transparent}
.fu-btn-done:hover{border-color:var(--green);color:var(--green)}
.fu-btn-reset{flex:0 0 auto;min-width:0;background:transparent;color:var(--mut);border-color:var(--bdr)}
.fu-btn-reset:hover{border-color:var(--txt);color:var(--txt)}
.fu-btn-snooze{flex:0 0 auto;min-width:0;background:transparent;color:var(--amber);border-color:rgba(251,191,36,.3)}
.fu-btn-snooze:hover{border-color:var(--amber)}
.fu-btn-owner{flex:0 0 auto;min-width:0;background:transparent;color:var(--dim);border-color:var(--bdr)}
.fu-btn-owner:hover{border-color:var(--purple);color:var(--purple)}
.fu-owners{margin-top:16px;padding:12px 14px;background:var(--card);border:1px dashed var(--bdr);border-radius:10px}
.fu-owners-h{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin-bottom:8px}
.fu-owners-list{display:flex;flex-wrap:wrap;gap:6px}
.fu-owner-chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;background:var(--card2);color:var(--dim);padding:4px 4px 4px 11px;border-radius:14px}
.fu-owner-chip button{background:transparent;border:none;color:var(--mut);cursor:pointer;font-size:15px;line-height:1;padding:0 5px;border-radius:50%}
.fu-owner-chip button:hover{color:var(--red)}
.fu-empty{text-align:center;padding:40px 20px;color:var(--dim);font-size:13px}
/* ---- GST & Bank ---- */
.gst-thresh{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px;margin-bottom:12px}
.gst-th-h{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin-bottom:12px}
.gst-bar-l{font-size:12px;color:var(--dim);margin-bottom:5px}
.gst-bar-l b{color:var(--txt);font-variant-numeric:tabular-nums}
.gst-bar{height:8px;background:var(--card2);border-radius:100px;overflow:hidden}
.gst-fill{height:100%;border-radius:100px;transition:width .5s ease}
.gst-warn{margin-top:12px;padding:9px 11px;background:rgba(251,191,36,.09);border:1px solid rgba(251,191,36,.3);border-radius:8px;font-size:12px;color:var(--amber);line-height:1.5}
.gst-ok{margin-top:12px;padding:9px 11px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.28);border-radius:8px;font-size:12px;color:var(--green);line-height:1.5}
.gst-note{margin-top:10px;font-size:11px;color:var(--dim);line-height:1.5}
.gst-note b{color:var(--txt)}
.gst-reg{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:11px 14px;font-size:12px;color:var(--dim)}
.gst-t{padding:5px 14px;border-radius:7px;border:1px solid var(--bdr2);background:var(--card2);color:var(--dim);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer}
.gst-t.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.gst-bands{display:flex;gap:6px;flex-wrap:wrap}
.gst-band{flex:1;min-width:112px;background:var(--card2);border:1px solid var(--bdr);border-radius:8px;padding:8px 10px}
.gst-band.on{border-color:var(--amber);background:rgba(251,191,36,.07)}
.gst-band-r{display:block;font-size:14px;font-weight:700;color:var(--txt)}
.gst-band.on .gst-band-r{color:var(--amber)}
.gst-band-b{display:block;font-size:10px;color:var(--mut);margin-top:2px;font-variant-numeric:tabular-nums}
.gst-date{padding:5px 9px;border-radius:7px;border:1px solid var(--bdr2);background:var(--card2);color:var(--txt);font-family:inherit;font-size:12px;color-scheme:dark}
.gst-owed{margin-left:6px;font-size:12px;color:var(--dim)}
.gst-owed b{color:var(--txt)}
.gst-owed i{color:var(--mut);font-style:normal;font-size:11px}
.gst-work{width:100%;border-collapse:collapse;font-size:12px}
.gst-work th{text-align:right;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);padding:0 0 8px;border-bottom:1px solid var(--bdr)}
.gst-work th:first-child{text-align:left}
.gst-work td{padding:7px 0;text-align:right;color:var(--dim);font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;border-bottom:1px solid var(--bdr)}
.gst-work td:first-child{text-align:left;font-family:inherit}
.gst-work td.neg{color:var(--red)}
.gst-work tr.sum td{color:var(--txt);font-weight:600;border-bottom:1px solid var(--bdr2)}
.gst-work tr.rate td{color:var(--mut);font-size:11px}
.gst-work tr.gap td{color:var(--mut);font-size:11px;font-family:inherit;text-align:right}
.gst-work tr.fin td{color:var(--amber);font-weight:700;border-bottom:0}
.gst-h{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin-bottom:8px}
.gst-yes{color:var(--green)}
.gst-no{color:var(--amber)}
/* ---- Order Calculator ---- */
.oc-modes{display:inline-flex;border:1px solid var(--bdr2);border-radius:10px;padding:3px;background:var(--card);margin-bottom:6px}
.oc-mode{padding:9px 26px;border:none;border-radius:7px;background:transparent;color:var(--dim);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.oc-mode.on{background:var(--blue);color:#fff}
.oc-note{font-size:11px;color:var(--dim);margin-bottom:14px;line-height:1.5}
.oc-wrap{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start}
.oc-list{display:flex;flex-direction:column;gap:8px}
.oc-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:11px 13px;transition:border-color .15s}
.oc-row.on{border-color:var(--blue)}
.oc-p{flex:1;min-width:0}
.oc-n{font-size:14px;font-weight:600;color:var(--txt);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.oc-str{font-size:10px;font-weight:700;color:var(--cyan);background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.3);padding:2px 6px;border-radius:5px;letter-spacing:.3px}
.oc-sub{font-size:11px;color:var(--mut);margin-top:2px}
.oc-warn{font-size:11px;color:var(--amber);margin-top:3px}
.oc-pr{font-size:14px;font-weight:700;color:var(--txt);min-width:64px;text-align:right;font-variant-numeric:tabular-nums}
.oc-stp{display:flex;align-items:center;border:1px solid var(--bdr2);border-radius:8px;overflow:hidden;background:var(--card2)}
.oc-b{width:32px;height:34px;border:none;background:transparent;color:var(--dim);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;line-height:1}
.oc-b:hover{background:var(--bdr);color:var(--txt)}
.oc-b:active{transform:scale(.9)}
.oc-q{width:40px;height:34px;border:none;background:transparent;color:var(--txt);text-align:center;font-family:inherit;font-size:13px;font-weight:700;-moz-appearance:textfield;outline:none}
.oc-q::-webkit-outer-spin-button,.oc-q::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.oc-sum{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px;position:sticky;top:14px}
.oc-sum-h{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin-bottom:12px}
.oc-li{display:flex;justify-content:space-between;gap:10px;font-size:12px;color:var(--dim);padding:5px 0}
.oc-li b{color:var(--txt);font-weight:600}
.oc-li span{font-variant-numeric:tabular-nums;white-space:nowrap}
.oc-hr{height:1px;background:var(--bdr);margin:10px 0}
.oc-tr{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);padding:3px 0}
.oc-tr span{font-variant-numeric:tabular-nums}
.oc-free{color:var(--green);font-weight:600}
.oc-tot{display:flex;justify-content:space-between;align-items:baseline;margin-top:8px;padding-top:10px;border-top:1px solid var(--bdr2)}
.oc-tot-l{font-size:12px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.oc-tot-v{font-size:24px;font-weight:700;color:var(--txt);font-variant-numeric:tabular-nums}
.oc-nudge{margin-top:10px;padding:8px 10px;background:rgba(79,140,255,.08);border:1px solid rgba(79,140,255,.28);border-radius:8px;font-size:11px;color:var(--blue);line-height:1.45}
.oc-acts{display:flex;gap:8px;margin-top:12px}
.oc-cp{flex:1;padding:10px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.oc-cp:hover{background:#3d7ae6}
.oc-cp.copied{background:var(--green)}
.oc-cl{padding:10px 14px;border-radius:8px;border:1px solid var(--bdr2);background:var(--card2);color:var(--dim);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.oc-cl:hover{color:var(--txt)}
.oc-none{font-size:12px;color:var(--mut);text-align:center;padding:18px 4px;line-height:1.5}
@media(max-width:860px){.oc-wrap{grid-template-columns:1fr}.oc-sum{position:static}}
.err-msg{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3);border-radius:10px;padding:16px;color:var(--red);font-size:13px;margin-bottom:20px}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--dim);font-size:14px}
.loading::before{content:"";width:20px;height:20px;border:2px solid var(--bdr);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-right:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.foot{margin-top:40px;padding-top:18px;border-top:1px solid rgba(42,45,58,.3);text-align:center;color:var(--mut);font-size:12px}
.foot a{color:var(--blue);text-decoration:none}
.setup{background:linear-gradient(135deg,rgba(79,140,255,.08),rgba(167,139,250,.08));border:1px solid var(--blue);border-radius:14px;padding:24px;margin-bottom:24px;display:none}
.setup h2{font-size:17px;margin-bottom:6px;color:var(--blue)}.setup p{font-size:13px;color:var(--dim);margin-bottom:14px}
.setup-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.setup input{flex:1;min-width:250px;border-radius:8px;border:1px solid var(--bdr2);background:#0f1117;color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:12px;padding:10px 14px;outline:none}
@media(max-width:768px){
  /* Whole app scaled to --mzoom so every tab fits more on a phone screen.
     zoom (not transform) so the layout genuinely reflows into the freed-up space. */
  .app{zoom:var(--mzoom);padding:12px 10px}
  /* Header */
  .hdr{margin-bottom:12px;padding-bottom:10px;gap:8px}
  .hdr h1{font-size:18px}
  .hdr p{font-size:11px}
  .live-txt{font-size:10px}
  .btn-sm{font-size:10px;padding:5px 9px}
  /* Tabs - much smaller pills */
  .tabs{margin-bottom:14px;gap:3px;padding-bottom:2px}
  .tab{padding:6px 11px;font-size:11px;border-radius:7px}
  /* Section headers */
  .sh{margin-bottom:10px;gap:6px}
  .sh h2{font-size:14px}
  .badge{font-size:9px;padding:3px 7px;letter-spacing:.4px}
  /* Card defaults */
  .mc{padding:12px;border-radius:10px}
  .mc-l{font-size:9px;margin-bottom:3px;letter-spacing:.5px}
  .mc-v{font-size:16px}
  .mc-s{font-size:10px}
  /* Grid spacing */
  .mg{gap:8px;margin-bottom:14px}
  .mg4,.mg5{grid-template-columns:1fr 1fr}
  .mg3,.mg2{grid-template-columns:1fr}
  /* Override inline-styled large numbers across all sections */
  .mc div[style*="font-size:24px"]{font-size:18px!important}

<script>
let SCRIPT_URL=localStorage.getItem("peps-script-url")||"https://script.google.com/macros/s/AKfycbyMHQ5OvFQmAYrJ_u-FaWR3ebC5aJ3V_fxsBqtrdNCBRnQ1ujhhKvL1NFSZ3uCFefn6Uw/exec";
// Secret key the Apps Script requires before it returns any data. Must match ACCESS_KEY in the Apps Script.
const SCRIPT_KEY=new URLSearchParams(location.search).get("key")||"";
function buildUrl(){return SCRIPT_URL+(SCRIPT_URL.indexOf("?")>=0?"&":"?")+"key="+encodeURIComponent(SCRIPT_KEY);}
let refreshTimer=null,activeTab="overview",D=null;
const PARTNERS=["Max","Bon","Jord"];
const TABS=[{k:"overview",l:"Overview"},{k:"followups",l:"Follow-Ups"},{k:"ordercalc",l:"Order Calculator"},{k:"points",l:"Points"},{k:"links",l:"Links"},{k:"products",l:"Products"},{k:"inventory",l:"Inventory"},{k:"lab",l:"Lab Orders"},{k:"cogs",l:"COGS"},{k:"gst",l:"GST & Bank"},{k:"partners",l:"Partners"},{k:"stocklist",l:"Stock List"}];

const num=s=>{if(s==null||s===""||(typeof s==="string"&&s.startsWith("#")))return 0;let v=String(s).replace(/[$,\s%]/g,"").replace(/[−–]/g,"-").replace(/^\((.+)\)$/,"-$1");const n=parseFloat(v);return isNaN(n)?0:n;};
const fmt=n=>{if(n==null||isNaN(n))return"$0.00";const a=Math.abs(n).toLocaleString("en-AU",{minimumFractionDigits:2,maximumFractionDigits:2});return n<0?`-$${a}`:`$${a}`;};
const pct=n=>isNaN(n)||!isFinite(n)?"—":(n*100).toFixed(1)+"%";
const esc=s=>s?String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"):"";
const sDate=d=>{if(!d)return"—";const s=String(d),m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(m){const M=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return parseInt(m[1])+" "+M[parseInt(m[2])-1];}return s.slice(0,10);};
const pillCls=s=>{const l=String(s||"").toLowerCase();if(l==="active"||l==="received"||l==="paid"||l==="completed"||l==="delivered")return"pill-g";if(l==="ordered"||l==="processing"||l==="pending"||l==="packed"||l==="sent"||l==="part paid")return"pill-a";if(l==="discontinued"||l==="cancelled"||l==="unpaid")return"pill-r";return"pill-b";};

function findRow(rows,col,val){for(let i=0;i<rows.length;i++){if(rows[i]&&String(rows[i][col]||"").trim()===val)return i;}return-1;}
function headerMap(rows,hr){const m={};if(!rows[hr])return m;rows[hr].forEach((h,i)=>{const k=String(h||"").trim();if(k)m[k]=i;});return m;}

function parseAll(raw){
  // Dashboard
  const dash=raw.Dashboard||[];
  const d={};
  // Match labels case-insensitively, trim trailing spaces from both keys and lookups
  const dMap={"bank balance":"bankBalance","paypal":"paypal","cash on hand":"cashOnHand","total (cash and bank):":"totalCash","bank reserve required":"bankReserve","bank gap (bank balance and reserve)":"bankGap","customer owes us":"customerOwes","customer credit / overpaid":"customerCredit","pending payouts":"pendingPayouts","partners owes account":"partnersOwesAccount","partners owes storage":"partnersOwesStorage","account owes partners":"accountOwesPartners","how many units in storage":"unitsStorage","total units":"totalUnits","inventory value":"invValue","inventory value (cost ex gst)":"invValue","potential revenue":"potRevenue","potential revenue (net ex gst)":"potRevenue","total expenses":"totalExpenses","total expenses (inc gst)":"totalExpenses","total lab orders":"totalLabOrders","total lab orders (inc gst)":"totalLabOrders","lab orders not received":"labNotReceived","lab # active products":"activeProducts"};
  const partners=[];
  dash.forEach(r=>{if(!r||!r[0])return;const l=String(r[0]).trim().toLowerCase();if(dMap[l])d[dMap[l]]=num(r[3]);const personLabel=String(r[0]).trim();if(personLabel==="Max"||personLabel==="Bon"||personLabel==="Jord")partners.push({person:personLabel,owesAccount:num(r[1]),owesStorage:num(r[2]),accountOwes:num(r[3]),netPosition:num(r[4]),unitsHeld:num(r[5])});});

  // Products - header marked by 'SKU' in col 0
  const prodRaw=raw.Products||[];const pH=findRow(prodRaw,0,"SKU");const pm=pH>=0?headerMap(prodRaw,pH):{};
  const products=[];
  for(let i=pH+1;i<prodRaw.length;i++){const r=prodRaw[i];if(!r||!String(r[0]||"").trim())continue;
    // Try multiple possible column header variants (sheet has changed over time)
    const costVal=num(r[pm["Cost "]]||r[pm["Cost"]]||r[pm["Cost ex GST (AUD)"]]);
    const sellPriceVal=num(r[pm["Customer Cost"]]||r[pm["Net Price "]]||r[pm["Net Price"]]||r[pm["Net Price ex GST (AUD)"]]);
    const cashPriceVal=num(r[pm[" Cash Price "]]||r[pm["Cash Price "]]||r[pm["Cash Price"]]);
    products.push({sku:r[pm.SKU]||"",name:r[pm.Product]||"",cat:r[pm.Category]||"",format:r[pm.Format]||"",strength:r[pm.Strength]||"",unit:r[pm.Unit]||"",onHand:num(r[pm["On Hand"]]),cost:costVal,netPrice:sellPriceVal,cashPrice:cashPriceVal,priceInc:sellPriceVal,marginPct:r[pm["Gross Margin %"]]||"",status:r[pm.Status]||"",desc:r[pm["Use / Benefits"]]||""});
  }

  // Money_Movements is no longer maintained in the sheet, so it isn't read. Expense
  // totals on Overview come off the Dashboard tab instead.

  // Lab - header marked by 'Order Date' in col 0
  const labRaw=raw.Lab_Orders||[];const lH=findRow(labRaw,0,"Order Date");const lm=lH>=0?headerMap(labRaw,lH):{};
  const lab=[];
  for(let i=lH+1;i<labRaw.length;i++){const r=labRaw[i];if(!r||!String(r[0]||"").trim())continue;lab.push({date:r[lm["Order Date"]]||"",sku:r[lm["Product SKU"]]||"",product:r[lm["Product Name"]]||"",qty:num(r[lm["Qty Ordered"]]),unitCost:num(r[lm["Unit Cost"]]),subtotal:num(r[lm.Subtotal]),shipping:num(r[lm.Shipping]),otherFees:num(r[lm["Other Fees"]]),total:num(r[lm["Total "]||r[lm.Total]]),status:r[lm.Status]||"",notes:r[lm.Notes]||""});}

  // Inventory
  const invRaw=raw.Inventory_Summary||[];const iH=findRow(invRaw,0,"SKU");const im=iH>=0?headerMap(invRaw,iH):{};
  const inventory=[];
  for(let i=iH+1;i<invRaw.length;i++){const r=invRaw[i];if(!r||!String(r[0]||"").trim())continue;
    const unitCost=num(r[im["Unit Cost"]]||r[im["Unit Cost ex GST (AUD)"]]);
    const stockVal=num(r[im["Stock Cost Value "]]||r[im["Stock Cost Value"]]||r[im["Stock Cost Value (AUD)"]]);
    const netP=num(r[im["Net Price"]]||r[im["Net Price ex GST (AUD)"]]);
    const potR=num(r[im["Potential Revenue"]]||r[im["Potential Revenue ex GST (AUD)"]]);
    const duds=num(r[im["Units of Duds"]]||r[im["Duds"]]);
    inventory.push({sku:r[im.SKU]||"",name:r[im.Product]||"",storage:num(r[im.Storage]),max:num(r[im.Max]),bon:num(r[im.Bon]),jord:num(r[im.Jord]),total:num(r[im["Total Units"]]),unitCost,stockValue:stockVal,netPrice:netP,potRev:potR,duds});
  }

  // Customer Orders - header on row 0, first column is now 'Order Date'
  const coRaw=raw.Customer_Orders||[];const cH=findRow(coRaw,0,"Order Date");const cm2=cH>=0?headerMap(coRaw,cH):{};
  const orders=[];
  for(let i=cH+1;i<coRaw.length;i++){const r=coRaw[i];if(!r)continue;if(!String(r[cm2["Customer Name"]]||"").trim())continue;
    const lineTotal=num(r[cm2["Total"]]);
    const cashTotal=num(r[cm2["Cash Total"]]||r[cm2["Total (if cash paid)"]]);
    const ownerTotal=num(r[cm2["Owner Total"]]);
    const totalAfterCogs=num(r[cm2["Total after COGS"]]||r[cm2["Total After COGS"]]);
    const payStatus=String(r[cm2["Payment Status"]]||"").trim();
    const payMethod=String(r[cm2["Payment Method"]]||"").trim();
    const isOwner=String(r[cm2["Owner Purchase"]]||"").trim().toLowerCase()==="yes";
    // Cost component (lab cost × qty) — derived from Total minus Total after COGS
    const costComponent=lineTotal-totalAfterCogs;
    // Pick the actual amount paid based on rules:
    // Owner Purchase = Yes → Owner Total
    // Payment Method = Cash → Cash Total
    // Otherwise → Total
    let actualRevenue=lineTotal;
    if(isOwner&&ownerTotal>0)actualRevenue=ownerTotal;
    else if(payMethod.toLowerCase()==="cash"&&cashTotal>0)actualRevenue=cashTotal;
    // Profit = actual revenue minus the lab cost (cost doesn't change with the price tier)
    const profit=actualRevenue-costComponent;
    const amtReceived=payStatus==="Paid"?actualRevenue:0;
    const balanceDue=payStatus==="Paid"?0:actualRevenue;
    orders.push({date:r[cm2["Order Date"]]||"",source:r[cm2.Source]||"",customer:r[cm2["Customer Name"]]||"",mobile:r[cm2.Mobile]||"",email:r[cm2.Email]||"",sku:r[cm2.SKU]||"",product:r[cm2["Product Name"]]||"",qty:num(r[cm2.Qty]),unitPrice:num(r[cm2["Unit Price "]]||r[cm2["Unit Price"]]||r[cm2["Unit Price ex GST (AUD)"]]),discount:r[cm2["Discount %"]]||"0%",profit,lineTotal:actualRevenue,totalCash:cashTotal,ownerTotal,payStatus,amountReceived:amtReceived,balanceDue,payMethod,fulfilment:r[cm2["Fulfilment Status"]]||"",fundsHolder:r[cm2["Funds Holder"]]||"",responsible:String(r[cm2["Stock Location"]]||r[cm2["Responsible Person"]]||"").trim(),freeVial:r[cm2["Free Vial?"]]||"",ownerPurchase:isOwner?"Yes":"No",packed:String(r[cm2["Packed and ready?"]]||"").trim(),creditUsed:num(r[cm2["Credit Used ($)"]]),notes:""});
  }

  // Fallbacks: if Dashboard sheet has #N/A or #REF! for these, calculate from raw data
  if(!d.customerOwes)d.customerOwes=orders.filter(o=>o.payStatus!=="Paid").reduce((s,o)=>s+o.balanceDue,0);
  if(!d.totalLabOrders)d.totalLabOrders=lab.reduce((s,l)=>s+l.total,0);
  // Fill in inventory cost/price from Products when Inventory_Summary left them at 0.
  // Uses resilient SKU matching (trim/case + strength fallback) so RETAT 20mg/15mg
  // and "Klow " (trailing space) pull cost/price from the matching Product.
  inventory.forEach(i=>{
    const p=prodForInv(i,products);
    if(p){
      if(!i.unitCost)i.unitCost=p.cost;
      if(!i.stockValue)i.stockValue=i.total*p.cost;
      if(!i.netPrice)i.netPrice=p.netPrice;
      if(!i.potRev)i.potRev=i.total*p.netPrice;
    }
  });
  if(!d.invValue)d.invValue=inventory.reduce((s,i)=>s+i.stockValue,0);
  if(!d.potRevenue)d.potRevenue=inventory.reduce((s,i)=>s+i.potRev,0);
  if(!d.totalUnits)d.totalUnits=inventory.reduce((s,i)=>s+i.total,0);
  if(!d.activeProducts)d.activeProducts=products.filter(p=>p.status==="Active").length;

  // COGS tab - packaging split + per-product true cost
  const cogsRaw=raw.COGS||[];
  let cogs={connected:cogsRaw.length>0,totalPackaging:0,totalVials:0,perVial:0,rows:[]};
  if(cogsRaw.length>0){
    // Find the label rows (Total Packaging Spend / Total Vials / Per Vial)
    cogsRaw.forEach(r=>{
      if(!r||!r[0])return;
      const lbl=String(r[0]).trim().toLowerCase();
      if(lbl.includes("total packaging"))cogs.totalPackaging=num(r[1]);
      else if(lbl.includes("total vials"))cogs.totalVials=num(r[1]);
      else if(lbl.includes("packaging cost per vial")||lbl.includes("per vial"))cogs.perVial=num(r[1]);
    });
    // Find product table header row, then read rows below
    let hdr=-1;
    for(let i=0;i<cogsRaw.length;i++){if(cogsRaw[i]&&String(cogsRaw[i][0]||"").trim().toUpperCase()==="SKU"){hdr=i;break;}}
    if(hdr>=0){
      for(let i=hdr+1;i<cogsRaw.length;i++){
        const r=cogsRaw[i];if(!r||!String(r[0]||"").trim())continue;
        cogs.rows.push({sku:r[0]||"",product:r[1]||"",labCost:num(r[2]),pkgCost:num(r[3]),totalCogs:num(r[4]),sellPrice:num(r[5]),marginDollar:num(r[6]),marginPct:num(r[7])});
      }
    }
    // Fallback: if perVial missing but we have spend+vials, calc it
    if(!cogs.perVial&&cogs.totalVials>0)cogs.perVial=cogs.totalPackaging/cogs.totalVials;
  }

  return{dashboard:d,partnerDetail:partners,products,lab,inventory,orders,cogs,rawDashboard:raw.Dashboard||[],rawViews:raw.Views||[]};
}

async function refreshData(){
  if(!SCRIPT_URL)return;const txt=document.getElementById("liveTxt"),err=document.getElementById("errMsg");
  err.innerHTML="";txt.textContent="Refreshing...";
  try{const resp=await fetch(buildUrl());const raw=await resp.json();if(raw.error)throw new Error(raw.error);D=parseAll(raw);txt.textContent="Live · "+new Date().toLocaleTimeString();document.getElementById("liveDot").style.display="block";const lm=document.getElementById("loadMsg");if(lm)lm.remove();render();}
  catch(e){console.error(e);err.innerHTML='<div class="err-msg">'+esc(e.message)+'</div>';txt.textContent="Error";}
}

function connect(){const u=document.getElementById("urlInput").value.trim();if(!u)return;SCRIPT_URL=u;localStorage.setItem("peps-script-url",u);document.getElementById("setupBox").style.display="none";startRefresh();refreshData();}
function toggleSetup(){const b=document.getElementById("setupBox");b.style.display=b.style.display==="none"?"block":"none";}
function startRefresh(){if(refreshTimer)clearInterval(refreshTimer);refreshTimer=setInterval(refreshData,60000);}
function renderTabs(){document.getElementById("tabs").innerHTML=TABS.map(t=>'<button class="tab'+(t.k===activeTab?" on":"")+'" onclick="switchTab(\''+t.k+'\')">'+t.l+'</button>').join("");}
function switchTab(k){activeTab=k;renderTabs();document.querySelectorAll(".sec").forEach(s=>s.classList.remove("on"));document.getElementById("sec-"+k).classList.add("on");if(D)render();}
/* Tell the Wix embed how tall we are, so it can grow the iframe to full height and let
 * the wrapper scroll natively. Older iOS Safari can't scroll reliably INSIDE an iframe —
 * it rubber-bands back — so we never ask it to.
 * Measures the bottom of the real content (.app, .foot, anything else). Deliberately NOT
 * body.scrollHeight: body has min-height:100vh, so a taller iframe would grow the viewport,
 * which grows body, which reports taller again — a loop that inflates forever. */
function postHeight(){
  try{
    const off=window.scrollY||window.pageYOffset||0;
    let bottom=0;
    const kids=document.body.children;
    for(let i=0;i<kids.length;i++){
      const el=kids[i],tag=el.tagName;
      if(tag==="SCRIPT"||tag==="STYLE"||tag==="LINK")continue;
      const b=el.getBoundingClientRect().bottom+off;
      if(b>bottom)bottom=b;
    }
    const h=Math.ceil(bottom)+16;
    if(h>0&&Math.abs(h-(postHeight._last||0))>2){postHeight._last=h;parent.postMessage({pepsHubHeight:h},"*");}
  }catch(e){}
}
function render(){if(!D)return;({overview:rOverview,followups:rFollowups,ordercalc:rOrderCalc,points:rPoints,links:rLinks,orders:rOrders,products:rProducts,inventory:rInventory,lab:rLab,cogs:rCogs,gst:rGst,partners:rPartners,stocklist:rStocklist})[activeTab]?.();postHeight();}
addEventListener("load",postHeight);
addEventListener("resize",postHeight);
if(window.ResizeObserver){try{new ResizeObserver(postHeight).observe(document.body);}catch(e){}}
setInterval(postHeight,1500);   // catch anything the observer misses (images, late renders)

function rOverview(){
  const d=D.dashboard,o=D.orders;
  // Order status counts
  const delivered=o.filter(x=>(x.fulfilment==="Completed"||x.fulfilment==="Delivered")&&(x.payStatus==="Paid"||x.payStatus==="Part Paid")).length;
  const totalOrders=o.length;

  // Three Kanban buckets — computed directly from Customer_Orders so each line always
  // shows name + products + amount (no longer reads the manually-typed Dashboard cells).
  const shortP=p=>String(p).replace(/\s*\([^)]*\)/g,"").trim();
  const buildBucket=(filterFn,amountKey)=>{
    const by={};
    o.forEach(x=>{
      if(!filterFn(x))return;
      const name=String(x.customer||"").trim();if(!name)return;
      if(!by[name])by[name]={name,items:{},amt:0};
      const pn=shortP(x.product)||"item";
      by[name].items[pn]=(by[name].items[pn]||0)+(x.qty||1);
      by[name].amt+=(x[amountKey]||0);
    });
    return Object.values(by).map(c=>{
      const prods=Object.entries(c.items).map(([p,q])=>p+" ("+q+")").join(", ");
      const amt=c.amt>0?" · "+fmt(c.amt):"";
      return {name:c.name,detail:prods+amt};
    }).sort((a,b)=>a.name.localeCompare(b.name));
  };
  const notDone=x=>x.fulfilment!=="Completed"&&x.fulfilment!=="Delivered";
  // Needs Action: not sent yet and not packed → needs packing
  const needsActionList=buildBucket(x=>notDone(x)&&x.packed!=="Yes","lineTotal");
  // Packed, Ready to Send: packed but not yet sent
  const packedList=buildBucket(x=>notDone(x)&&x.packed==="Yes","lineTotal");
  // Ready to Pay: still owes money
  const readyToPayList=buildBucket(x=>x.payStatus==="Unpaid","balanceDue");

  // Bank balance: read directly from Dashboard tab cell D6
  const adjBankBalance=(d.bankBalance||0);
  // PayPal balance from Dashboard tab cell D7
  const paypalBal=(d.paypal||0);
  // Cash on Hand from Dashboard tab cell D8
  const cashOnHand=(d.cashOnHand||0);
  // Total held: prefer Dashboard tab "Total" cell; fall back to bank+paypal+cash if blank
  const totalHeld=(d.totalCash||0)||(adjBankBalance+paypalBal+cashOnHand);

  const totalRevenue=o.filter(x=>x.payStatus==="Paid"||x.payStatus==="Part Paid").reduce((s,x)=>s+x.amountReceived,0);
  const totalTrueProfit=o.filter(x=>x.payStatus==="Paid"||x.payStatus==="Part Paid").reduce((s,x)=>s+x.profit,0);

  // Profit this week / this month — from PAID orders only, by Order Date
  const today=new Date();
  const dayOfWeek=(today.getDay()+6)%7; // Monday=0
  const weekStart=new Date(today);weekStart.setHours(0,0,0,0);weekStart.setDate(today.getDate()-dayOfWeek);
  const monthStart=new Date(today.getFullYear(),today.getMonth(),1);
  const orderDateObj=(s)=>{const m=String(s||"").match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(!m)return null;return new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]));};

  let weekProfit=0,monthProfit=0,weekCount=0,monthCount=0;
  let weekVials=0,monthVials=0,lifetimeVials=0;
  let weekRevenue=0,monthRevenue=0;
  const weekBySku={},monthBySku={},lifetimeBySku={};
  o.forEach(x=>{
    if(x.payStatus!=="Paid"&&x.payStatus!=="Part Paid")return;
    const od=orderDateObj(x.date);if(!od)return;
    const qty=x.qty||0;
    const skuName=x.product||x.sku||"Unknown";
    lifetimeVials+=qty;
    lifetimeBySku[skuName]=(lifetimeBySku[skuName]||0)+qty;
    if(od>=monthStart){monthProfit+=x.profit;monthCount++;monthVials+=qty;monthRevenue+=x.amountReceived;monthBySku[skuName]=(monthBySku[skuName]||0)+qty;}
    if(od>=weekStart){weekProfit+=x.profit;weekCount++;weekVials+=qty;weekRevenue+=x.amountReceived;weekBySku[skuName]=(weekBySku[skuName]||0)+qty;}
  });
  const fmtBreakdown=(obj)=>{const e=Object.entries(obj).sort((a,b)=>b[1]-a[1]);if(e.length===0)return"No vials sold yet";return e.map(([n,c])=>esc(n)+': '+c).join(' · ');};
  const monthBreakdown=fmtBreakdown(monthBySku);
  const lifetimeBreakdown=fmtBreakdown(lifetimeBySku);

  // Free vial stats
  const freeVials=o.filter(x=>x.freeVial==="Yes");
  const freeVialCount=freeVials.reduce((s,x)=>s+x.qty,0);

function parseOrderDate(s){
  if(!s)return 0;
  const m=String(s).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m)return parseInt(m[3])*10000+parseInt(m[2])*100+parseInt(m[1]);
  // Fallback for ISO/other formats
  const d=new Date(s);
  return isNaN(d)?0:d.getTime()/1000;
}

  } else {
    const nt=ptsNext(ms+total);
    if(nt){const gap=nt.min-(ms+total);if(gap>0&&gap<=50)out.push("Another "+fuMoney(gap)+" this month and you'd bump up to $"+nt.pts+" credit.");}
  }
  return out.length?"\n\n"+out.join(" "):"";
}
function fuMsg(stage,name,soonProd,allProds,cost,rew){
  const n=name||"there";
  const q=fuQuote(cost);
  const perks=fuPerks(rew,cost);
  const hasBac=!!(cost&&cost.bacPrice);
  if(stage==="red")
    return "Heya "+n+"! Reckon you're about to run out of your "+soonProd+" - didn't want ya getting caught short. Want me to sort another batch for you?"+(hasBac?" Happy to throw in some "+cost.bacName+" to go with it too.":"")+q+perks+"\n\nJust give us a yell and I'll get it packed 🙌";
  if(stage==="amber")
    return "Hey "+n+"! How ya going with the "+(allProds||soonProd)+"? Figured you'd be working through it by now. Can line up your next lot whenever you're ready."+(hasBac?" Chuck in some "+cost.bacName+" with it and you're sorted.":"")+q+perks+"\n\nNo rush at all, just let me know 😊";
  // green - friendly check-in, no hard sell
  return "Hey "+n+"! Just checking in - how's the "+(allProds||soonProd)+" treating ya? Hope you're feeling good on it. Any questions about dosing or whatever, give us a yell anytime 😊";
}
function fuFallbackCopy(text,cb){const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}catch(e){}document.body.removeChild(ta);if(cb)cb();}
function fuCopy(btn,i){
  if(!fuList[i])return;const text=fuList[i].msg;
  const done=()=>{btn.textContent="✓ Copied";btn.classList.add("copied");setTimeout(()=>{btn.textContent="Copy message";btn.classList.remove("copied");},1800);};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(done).catch(()=>fuFallbackCopy(text,done));}
  else fuFallbackCopy(text,done);
}

/* ================= Order Calculator =================
 * Standalone quoting tool. Prices come live from the Products tab:
 *   netPrice  = "Customer Cost" column = TRANSFER price
 *   cashPrice = "Cash Price" column    = CASH price
 * Postage: cash orders never pay it. Transfer orders pay $12 express
 * unless the stock subtotal reaches the free-postage threshold.
 */
const OC_SHIP=12;        // express postage on transfer orders
const OC_FREE_AT=199;    // subtotal at/above this = free postage
let ocMode="transfer";   // "cash" | "transfer"
let ocQty={};            // sku -> qty

function ocPrice(p){return ocMode==="cash"?(p.cashPrice||0):(p.netPrice||0);}
function ocActive(){return (D.products||[]).filter(p=>p.sku&&String(p.status||"").trim().toLowerCase()==="active");}
// "KLOW = GLOW + KPV (adds an anti-inflammatory peptide)" -> {main:"KLOW", sub:"GLOW + KPV"}
// "GHK-Cu (Copper Peptide)" -> {main:"GHK-Cu", sub:"Copper Peptide"}
function ocName(p){
  const full=String(p.name||"").trim();
  let main=full,sub="";
  const eq=full.indexOf("=");
  if(eq>0){main=full.slice(0,eq).trim();sub=full.slice(eq+1).trim();}
  const pm=main.match(/^([^(]+)\(([^)]*)\)\s*$/);
  if(pm){main=pm[1].trim();if(!sub)sub=pm[2].trim();}
  const sm=sub.match(/^([^(]*)\(([^)]*)\)\s*$/);
  if(sm&&sm[1].trim())sub=sm[1].trim();
  return {main:main||full,sub};
}
// Dose badge — only when the unit is a real measurement, so we never invent a dose (e.g. unit "Vial")
function ocStrength(p){
  const s=String(p.strength||"").trim(),u=String(p.unit||"").trim();
  if(!s)return "";
  return /^(mg|ml|mcg|g|iu)$/i.test(u)?(s+u):"";
}
function ocLabel(p){const n=ocName(p),st=ocStrength(p);return n.main+(st?" "+st:"");}
function ocTotals(){
  const lines=[];let sub=0;
  ocActive().forEach(p=>{
    const q=ocQty[p.sku];if(!q)return;
    const price=ocPrice(p),amt=price*q;
    sub+=amt;
    lines.push({sku:p.sku,label:ocLabel(p),qty:q,price,amt});
  });
  const ship=(ocMode==="transfer"&&sub>0&&sub<OC_FREE_AT)?OC_SHIP:0;
  return {lines,sub,ship,total:sub+ship};
}
function ocSetMode(m){ocMode=m;rOrderCalc();}
function ocAdd(sku,n){const q=(ocQty[sku]||0)+n;if(q<=0)delete ocQty[sku];else ocQty[sku]=Math.min(q,99);rOrderCalc();}
function ocSet(sku,v){const q=Math.max(0,Math.min(99,Math.round(num(v))));if(q<=0)delete ocQty[sku];else ocQty[sku]=q;rOrderCalc();}
function ocClear(){ocQty={};rOrderCalc();}
// Plain-text summary to send the client
function ocSummary(){
  const t=ocTotals();
  if(!t.lines.length)return "";
  const L=["Order summary ("+(ocMode==="cash"?"cash":"bank transfer")+")",""];
  t.lines.forEach(l=>L.push("• "+l.label+" x"+l.qty+" - "+fuMoney(l.amt)));
  L.push("");
  if(ocMode==="cash"){
    L.push("Total: "+fuMoney(t.total));
  }else{
    L.push("Subtotal: "+fuMoney(t.sub));
    L.push("Postage: "+(t.ship?fuMoney(t.ship)+" express":"free - over $"+OC_FREE_AT));
    L.push("Total: "+fuMoney(t.total));
    const gap=OC_FREE_AT-t.sub;
    if(t.ship&&gap>0)L.push("","Add "+fuMoney(gap)+" more and postage is on us.");
  }
  return L.join("\n");
}
function ocCopy(btn){
  const text=ocSummary();if(!text)return;
  const done=()=>{btn.textContent="✓ Copied";btn.classList.add("copied");setTimeout(()=>{btn.textContent="Copy summary";btn.classList.remove("copied");},1800);};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(done).catch(()=>fuFallbackCopy(text,done));}
  else fuFallbackCopy(text,done);
}
// Repaint prices/qty/summary without rebuilding the rows, so the 25s poll
// can't wipe a qty box while it's being typed in.
function ocPaint(){
  const prods=ocActive();
  prods.forEach(p=>{
    const row=document.getElementById("ocRow-"+p.sku);if(!row)return;
    const q=ocQty[p.sku]||0;
    row.classList.toggle("on",q>0);
    const pr=row.querySelector(".oc-pr");if(pr)pr.textContent=fuMoney(ocPrice(p));
    const inp=row.querySelector(".oc-q");
    if(inp&&document.activeElement!==inp)inp.value=q;
    const w=row.querySelector(".oc-warn");
    if(w){const over=q>0&&p.onHand!=null&&q>p.onHand;w.textContent=over?("Only "+p.onHand+" on hand"):"";w.style.display=over?"block":"none";}
  });
  document.querySelectorAll(".oc-mode").forEach(b=>b.classList.toggle("on",b.dataset.m===ocMode));
  const t=ocTotals(),sum=document.getElementById("ocSum");
  if(!sum)return;
  if(!t.lines.length){
    sum.innerHTML='<div class="oc-sum-h">Summary</div><div class="oc-none">Pick some products and the total shows up here.</div>';
    return;
  }
  const items=t.lines.map(l=>'<div class="oc-li"><b>'+l.label+'</b> <span>'+l.qty+' × '+fuMoney(l.price)+' = '+fuMoney(l.amt)+'</span></div>').join("");
  let money;
  if(ocMode==="cash"){
    money='<div class="oc-tr"><span>Cash order - no postage</span><span></span></div>';
  }else{
    money='<div class="oc-tr"><span>Subtotal</span><span>'+fuMoney(t.sub)+'</span></div>'+
          '<div class="oc-tr"><span>Express postage</span><span class="'+(t.ship?'':'oc-free')+'">'+(t.ship?fuMoney(t.ship):'FREE')+'</span></div>';
  }
  const gap=OC_FREE_AT-t.sub;
  const nudge=(ocMode==="transfer"&&t.ship&&gap>0)?'<div class="oc-nudge">Add '+fuMoney(gap)+' more and postage is free.</div>':'';
  sum.innerHTML='<div class="oc-sum-h">Summary</div>'+items+'<div class="oc-hr"></div>'+money+
    '<div class="oc-tot"><span class="oc-tot-l">Total</span><span class="oc-tot-v">'+fuMoney(t.total)+'</span></div>'+nudge+
    '<div class="oc-acts"><button class="oc-cp" onclick="ocCopy(this)">Copy summary</button><button class="oc-cl" onclick="ocClear()">Clear</button></div>';
}
function rOrderCalc(){
  const el=document.getElementById("sec-ordercalc");
  const prods=ocActive();
  const sig=prods.map(p=>p.sku).join("|");
  if(el.dataset.sig!==sig){   // only rebuild rows when the product list itself changes
